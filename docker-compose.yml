services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000}
    env_file:
      - path: .env
        required: false
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"
        reservations:
          memory: 2g
          cpus: "1"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 16g
          cpus: "4"
        reservations:
          memory: 8g
          cpus: "2"

  model-puller:
    image: ollama/ollama:latest
    profiles: ["setup"]
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      - sh
      - -c
      - |
        echo "Pulling extraction model (qwen2.5:7b-instruct-q4_K_M)..."
        ollama pull qwen2.5:7b-instruct-q4_K_M
        echo "Pulling VLM model (gemma3:4b)..."
        ollama pull gemma3:4b
        echo "All models pulled. You can now run: docker compose up -d"
    depends_on:
      ollama:
        condition: service_started

volumes:
  ollama_data:
